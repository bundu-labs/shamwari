name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, types, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Build
        run: npm run build
        env:
          WORKOS_CLIENT_ID: client_test_01H000000000000000000000
          WORKOS_API_KEY: replace-in-vercel-env
          WORKOS_REDIRECT_URI: http://localhost:3001/callback
          WORKOS_COOKIE_PASSWORD: build-time-placeholder-32-chars-min
