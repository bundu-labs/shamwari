name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, types, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Vercel's serverless runtimes top out at node 22, and
          # @sveltejs/adapter-vercel refuses to build with newer.
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Build
        run: npm run build
        env:
          WORKOS_CLIENT_ID: client_test_01H000000000000000000000
          WORKOS_API_KEY: replace-in-vercel-env
          WORKOS_REDIRECT_URI: http://localhost:3001/callback
          WORKOS_COOKIE_PASSWORD: build-time-placeholder-32-chars-min

  python:
    name: Python (lint, types, tests)
    runs-on: ubuntu-latest
    env:
      SHAMWARI_ALLOW_HEADER_AUTH: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/

      - name: Pytest
        run: pytest --tb=short

      - name: Verify OpenAPI spec
        run: python -c "from src.main import app; spec = app.openapi(); paths = spec.get('paths', {}); assert paths, 'No API paths defined'; print('OpenAPI paths:', len(paths))"
