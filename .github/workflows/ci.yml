name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, types, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # SvelteKit 2 + Vite 6 prefer Node 22+. We track current LTS.
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so AuthKit's configureAuthKit() doesn't
          # explode during prerender. Real values live in Vercel project env.
          WORKOS_CLIENT_ID: client_test_01H000000000000000000000
          WORKOS_API_KEY: replace-in-vercel-env
          WORKOS_REDIRECT_URI: http://localhost:3001/callback
          WORKOS_COOKIE_PASSWORD: build-time-placeholder-32-chars-min

  python:
    name: Python (lint, types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy type check
        run: mypy src/

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    needs: python
    if: hashFiles('tests/**/*.py') != ''
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"

      - run: pytest --tb=short

  openapi-check:
    name: Verify OpenAPI spec
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e .

      - name: Generate OpenAPI spec and verify
        run: |
          python -c "
          import json
          from src.main import app

          spec = app.openapi()
          assert len(spec.get('paths', {})) > 0, 'No API paths defined'
          print(f\"Title: {spec['info']['title']}\")
          print(f\"Version: {spec['info']['version']}\")
          print(f\"Paths: {len(spec.get('paths', {}))}\")
          "
